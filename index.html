<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Mantap: Scientific Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .calc-btn { transition: all 0.2s; }
        .calc-btn:active { transform: scale(0.95); }
        .hidden-view { display: none; }
        .btn-sci { background: #334155; color: #cbd5e1; }
        .btn-sci:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-sm bg-slate-800 rounded-3xl shadow-2xl overflow-hidden border border-slate-700">
        
        <!-- Navigation Header -->
        <div class="flex bg-slate-900 p-1">
            <button onclick="switchView('calc')" id="tab-calc" class="flex-1 py-2 text-xs font-semibold text-white bg-slate-700 rounded-xl">Kalkulator</button>
            <button onclick="switchView('conv')" id="tab-conv" class="flex-1 py-2 text-xs font-semibold text-slate-400">Konverter</button>
            <button onclick="switchView('acc')" id="tab-acc" class="flex-1 py-2 text-xs font-semibold text-slate-400">Akun</button>
        </div>

        <!-- Calculator View -->
        <div id="view-calc">
            <div class="flex justify-between items-center px-4 pt-2">
                <button onclick="toggleScientific()" class="text-[10px] bg-slate-700 text-slate-300 px-3 py-1 rounded-full hover:bg-slate-600">
                    Mode Saintifik
                </button>
                <div id="sci-status" class="text-[10px] text-blue-400 font-bold hidden">SCIENTIFIC</div>
            </div>
            <div class="p-6 text-right">
                <div id="prev-display" class="text-slate-500 text-sm h-6"></div>
                <div id="main-display" class="text-white text-5xl font-light h-16 overflow-x-auto whitespace-nowrap">0</div>
            </div>
            <div class="grid grid-cols-4 gap-2 p-4 bg-slate-800" id="keypad"></div>
        </div>

        <!-- Converter View -->
        <div id="view-conv" class="hidden-view p-6 text-white min-h-[350px]">
            <h2 class="text-xl font-bold mb-4">Konverter</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-400">Panjang (CM ke Inch)</label>
                    <input type="number" id="conv-len" oninput="convert()" placeholder="Masukkan CM" class="w-full bg-slate-700 p-3 rounded-xl border border-slate-600 focus:outline-none">
                    <div id="res-len" class="text-blue-400 mt-1 font-semibold">Hasil: 0 Inch</div>
                </div>
            </div>
        </div>

        <!-- Account View -->
        <div id="view-acc" class="hidden-view p-6 text-white min-h-[350px]">
            <h2 class="text-xl font-bold mb-4">Status Akun</h2>
            <div id="acc-content" class="bg-slate-700 p-4 rounded-xl text-center">
                <p id="trial-status" class="font-bold text-lg"></p>
                <p id="trial-days" class="text-xs text-slate-400 mt-2"></p>
            </div>
        </div>
    </div>

    <script>
        const state = { 
            current: '0', 
            trialEnd: null, 
            isScientific: false 
        };

        function initApp() {
            let start = localStorage.getItem('trial_start');
            if (!start) {
                start = new Date().getTime();
                localStorage.setItem('trial_start', start);
            }
            state.trialEnd = parseInt(start) + (30 * 24 * 60 * 60 * 1000);
            renderKeypad();
            updateAccStatus();
        }

        function toggleScientific() {
            state.isScientific = !state.isScientific;
            document.getElementById('sci-status').classList.toggle('hidden', !state.isScientific);
            renderKeypad();
        }

        function renderKeypad() {
            const keypad = document.getElementById('keypad');
            keypad.innerHTML = '';
            
            // Buttons map
            let buttons = [['C', '÷', '×', '⌫'], ['7', '8', '9', '-'], ['4', '5', '6', '+'], ['1', '2', '3', '='], ['0', '.', '']];
            
            if (state.isScientific) {
                buttons = [['sin', 'cos', 'tan', '√'], ['^', '(', ')', '⌫'], ['7', '8', '9', '-'], ['4', '5', '6', '+'], ['1', '2', '3', '='], ['0', '.', 'C', '']];
            }

            buttons.flat().forEach(btn => {
                if(btn === '') return;
                const el = document.createElement('button');
                el.innerText = btn;
                el.className = "calc-btn bg-slate-700 hover:bg-slate-600 text-white p-4 rounded-2xl text-xl font-medium";
                if(['÷', '×', '-', '+', '='].includes(btn)) el.classList.add('bg-orange-500', 'hover:bg-orange-600');
                if(state.isScientific && ['sin', 'cos', 'tan', '√', '^', '(', ')'].includes(btn)) el.classList.add('btn-sci');
                el.onclick = () => handleInput(btn);
                keypad.appendChild(el);
            });
        }

        function handleInput(val) {
            const now = new Date().getTime();
            if (now > state.trialEnd) { return; }
            
            const display = document.getElementById('main-display');
            if (val === 'C') state.current = '0';
            else if (val === '⌫') state.current = state.current.length > 1 ? state.current.slice(0, -1) : '0';
            else if (val === '=') {
                try {
                    let expression = state.current
                        .replace(/×/g, '*')
                        .replace(/÷/g, '/')
                        .replace(/√/g, 'Math.sqrt')
                        .replace(/\^/g, '**')
                        .replace(/sin/g, 'Math.sin')
                        .replace(/cos/g, 'Math.cos')
                        .replace(/tan/g, 'Math.tan');
                    state.current = eval(expression).toString();
                } catch(e) { state.current = 'Error'; }
            } else {
                state.current = (state.current === '0' && val !== '.') ? val : state.current + val;
            }
            display.innerText = state.current;
        }

        function switchView(view) {
            document.getElementById('view-calc').classList.toggle('hidden-view', view !== 'calc');
            document.getElementById('view-conv').classList.toggle('hidden-view', view !== 'conv');
            document.getElementById('view-acc').classList.toggle('hidden-view', view !== 'acc');
            ['calc', 'conv', 'acc'].forEach(v => {
                const btn = document.getElementById('tab-' + v);
                btn.className = (view === v) ? 'flex-1 py-2 text-xs font-semibold text-white bg-slate-700 rounded-xl' : 'flex-1 py-2 text-xs font-semibold text-slate-400';
            });
        }

        function convert() {
            const cm = document.getElementById('conv-len').value;
            document.getElementById('res-len').innerText = `Hasil: ${(cm * 0.393701).toFixed(2)} Inch`;
        }

        function updateAccStatus() {
            const now = new Date().getTime();
            const daysLeft = Math.ceil((state.trialEnd - now) / (1000 * 60 * 60 * 24));
            document.getElementById('trial-status').innerText = daysLeft > 0 ? "Trial Aktif" : "Trial Berakhir";
            document.getElementById('trial-days').innerText = daysLeft > 0 ? `${daysLeft} hari tersisa` : "Hubungi admin untuk akses.";
        }

        window.onload = initApp;
    </script>
</body>
</html>
